{% extends "website/modelo.html" %}

{% load static %}

{% block titulo %}Detalhes do Campus | Arena eSports{% endblock titulo %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden bg-white">
            <div class="card-header bg-primary bg-opacity-10 border-0 p-4 text-center">
                <div class="bg-white text-primary d-inline-flex align-items-center justify-content-center rounded-circle shadow-sm mb-3" style="width: 80px; height: 80px;">
                    <i class="bi bi-building fs-1"></i>
                </div>
                <h1 class="h4 fw-bold text-dark mb-0">{{ object.nome }}</h1>
                <p class="text-muted small mb-0">Informações da Unidade</p>
            </div>
            
            <div class="card-body p-0">
                <ul class="list-group list-group-flush">
                    <li class="list-group-item px-4 py-3 d-flex justify-content-between align-items-center border-0">
                        <span class="text-muted fw-medium"><i class="bi bi-geo-alt me-2"></i> Localização</span>
                        <span class="text-dark fw-semibold">{{ object.nome }}</span>
                    </li>
                </ul>
            </div>

            <div class="card-footer bg-light border-0 p-4">
                <div class="d-flex gap-2">
                    <a href="javascript:history.back()" class="btn btn-light border flex-grow-1 d-inline-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-arrow-left"></i> Voltar
                    </a>
                    <a href="{% url 'campus_update' object.pk %}" class="btn btn-primary px-4 d-inline-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-pencil"></i> Editar
                    </a>
                    <a href="{% url 'campus_delete' object.pk %}" class="btn btn-outline-danger px-3 d-inline-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-trash"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
