{% extends "website/modelo.html" %}

{% block titulo %}Listagem{% endblock %}

{% block conteudo %}
<div class="card border-0 shadow-sm">
    <div class="card-body">
        <h1 class="h4 fw-bold mb-3">Listagem</h1>

        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Registro</th>
                    <th class="text-end">Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for object in object_list %}
                <tr>
                    <td>{{ object }}</td>
                    <td class="text-end">
                        <a href="../ver/{{ object.pk }}/" class="btn btn-outline-info btn-sm">Detalhes</a>
                        <a href="../editar/{{ object.pk }}/" class="btn btn-outline-primary btn-sm">Editar</a>
                        <a href="../excluir/{{ object.pk }}/" class="btn btn-outline-danger btn-sm">Excluir</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center text-muted py-4">
                        Nenhum registro encontrado.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
